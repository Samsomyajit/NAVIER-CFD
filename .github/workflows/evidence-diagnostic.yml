name: Evidence diagnostic
on:
  push:
  pull_request:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Run focused evidence tests
        env:
          PYTHONPATH: src
        run: |
          set +e
          python -m pytest tests/test_evidence_recommender.py tests/test_recommender.py -q --tb=short > pytest-diagnostic.txt 2>&1
          status=$?
          cat pytest-diagnostic.txt
          echo "$status" > pytest-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-pytest-diagnostic
          path: |
            pytest-diagnostic.txt
            pytest-status.txt
