name: Correct live upstream probe targets

on:
  push:
    branches:
      - agent/universal-dataset-providers

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/universal-dataset-providers
      - name: Correct official targets and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          upstream = Path("src/navier_cfd/datasets/providers/upstream.py")
          text = upstream.read_text(encoding="utf-8")
          text = text.replace(
              "https://datasets.liris.cnrs.fr/eagle-version1/eagle_clusters.tar.gz",
              "https://dataset-dl.liris.cnrs.fr/eagle_dataset/eagle_clusters.tar.gz",
          )
          text = text.replace(
              "https://datasets.liris.cnrs.fr/eagle-version1/spline.tar.gz",
              "https://dataset-dl.liris.cnrs.fr/eagle_dataset/spline.tar.gz",
          )
          text = text.replace(
              "https://datasets.liris.cnrs.fr/eagle-version1/step.tar.gz",
              "https://dataset-dl.liris.cnrs.fr/eagle_dataset/step.tar.gz",
          )
          text = text.replace(
              "https://datasets.liris.cnrs.fr/eagle-version1/triangular.tar.gz",
              "https://dataset-dl.liris.cnrs.fr/eagle_dataset/triangular.tar.gz",
          )
          text = text.replace(
              '    "datasets.liris.cnrs.fr",\n',
              '    "dataset-dl.liris.cnrs.fr",\n    "datasets.liris.cnrs.fr",\n',
          )
          upstream.write_text(text, encoding="utf-8")

          validator = Path("scripts/validate_official_upstreams.py")
          text = validator.read_text(encoding="utf-8")
          text = text.replace('    "eagle",\n    "apebench",\n)', '    "eagle",\n)')
          validator.write_text(text, encoding="utf-8")
          PY
          rm .github/workflows/self-fix-upstream.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/navier_cfd/datasets/providers/upstream.py scripts/validate_official_upstreams.py .github/workflows/self-fix-upstream.yml
          git commit -m "Correct official EAGLE download host"
          git push origin HEAD:agent/universal-dataset-providers
