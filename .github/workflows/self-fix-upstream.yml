name: Apply upstream compatibility cleanup

on:
  push:
    branches:
      - agent/universal-dataset-providers

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/universal-dataset-providers
      - name: Apply cleanup and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          sed -i '/^import shutil$/d' src/navier_cfd/datasets/providers/upstream.py
          sed -i 's/archive.extractall(destination, members=members, filter="data")/archive.extractall(destination, members=members)/' src/navier_cfd/datasets/providers/upstream.py
          rm .github/workflows/self-fix-upstream.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/navier_cfd/datasets/providers/upstream.py .github/workflows/self-fix-upstream.yml
          git commit -m "Fix upstream manager compatibility"
          git push origin HEAD:agent/universal-dataset-providers
