name: Bootstrap project website and recommender

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct website patch
        shell: bash
        run: |
          base64 --decode bootstrap/site_patch.tar.gz.b64 > /tmp/navier-site-patch.tar.gz
          tar --extract --gzip --file /tmp/navier-site-patch.tar.gz --directory .
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap-site.yml
      - name: Validate browser recommender
        shell: bash
        run: |
          node --test website/recommender/recommender-core.test.mjs
          test -f website/index.html
          test -f website/recommender/index.html
      - name: Commit final project website
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add NAVIER-CFD project website and interactive recommender"
          git push origin HEAD:main
