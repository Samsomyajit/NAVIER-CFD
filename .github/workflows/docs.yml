name: Validate project website

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[docs]"
      - name: Build browser recommender runtime
        run: python scripts/build_web_runtime.py
      - name: Build technical documentation
        run: mkdocs build --strict --site-dir _site/docs
      - name: Assemble and validate project website
        run: |
          cp -a website/. _site/
          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/recommender/index.html
          test -f _site/runtime/navier_runtime.zip
          test -f _site/data/catalog.json
          test -f _site/docs/index.html
