name: Publish website to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[docs]"
      - name: Build browser recommender runtime
        run: python scripts/build_web_runtime.py
      - name: Build technical documentation
        run: mkdocs build --strict --site-dir _site/docs
      - name: Assemble standalone project website
        run: |
          cp -a website/. _site/
          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/recommender/index.html
          test -f _site/recommender/runtime/navier_runtime.zip
          test -f _site/docs/index.html
      - name: Publish generated site to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy NAVIER-CFD website from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
