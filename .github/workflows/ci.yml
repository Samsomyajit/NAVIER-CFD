name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        if: matrix.python-version == '3.12'
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip --quiet
      - run: pip install -e ".[dev]" --quiet
      - run: ruff check src tests
      - name: Run Python tests
        id: pytest
        shell: bash
        run: |
          set +e
          pytest --cov=navier_cfd --cov-report=term-missing --tb=short -q > pytest-${{ matrix.python-version }}.txt 2>&1
          status=$?
          cat pytest-${{ matrix.python-version }}.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.txt
      - name: Enforce Python test result
        if: steps.pytest.outputs.status != '0'
        run: exit 1
      - name: Test browser recommender
        if: matrix.python-version == '3.12'
        run: node --test website/recommender/recommender-core.test.mjs

  native-models:
    name: Native model and training smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip --quiet
      - name: Install CPU PyTorch
        run: python -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -e ".[dev]" --quiet
      - name: Run executable model and experiment tests
        run: pytest tests/test_model_hub.py tests/test_pibert_pipeline.py -q
