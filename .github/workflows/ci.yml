name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        if: matrix.python-version == '3.12'
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip --quiet
      - run: pip install -e ".[dev]" --quiet
      - name: Run Ruff
        id: ruff
        shell: bash
        run: |
          set +e
          ruff check src tests --output-format=concise > ruff-${{ matrix.python-version }}.txt 2>&1
          status=$?
          cat ruff-${{ matrix.python-version }}.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-${{ matrix.python-version }}
          path: ruff-${{ matrix.python-version }}.txt
      - name: Enforce Ruff result
        if: steps.ruff.outputs.status != '0'
        run: exit 1
      - name: Run Python tests
        id: pytest
        shell: bash
        run: |
          set +e
          pytest --cov=navier_cfd --cov-report=term-missing --tb=short -q > pytest-${{ matrix.python-version }}.txt 2>&1
          status=$?
          cat pytest-${{ matrix.python-version }}.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.txt
      - name: Enforce Python test result
        if: steps.pytest.outputs.status != '0'
        run: exit 1
      - name: Test browser recommender
        if: matrix.python-version == '3.12'
        run: node --test website/recommender/recommender-core.test.mjs

  native-models:
    name: Native models, providers, metrics, and training smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip --quiet
      - name: Install CPU PyTorch
        run: python -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install NAVIER-CFD, The Well provider, and test dependencies
        run: pip install -e ".[dev,the-well]" --quiet
      - name: Validate official The Well API contract
        run: |
          python - <<'PY'
          import inspect
          from the_well.data import WellDataset
          parameters = inspect.signature(WellDataset).parameters
          required = {
              "well_base_path",
              "well_dataset_name",
              "well_split_name",
              "normalization_type",
              "n_steps_input",
              "n_steps_output",
              "full_trajectory_mode",
              "storage_options",
          }
          missing = required - set(parameters)
          if missing:
              raise SystemExit(f"The Well API contract changed; missing parameters: {sorted(missing)}")
          PY
      - name: Run executable model, provider, metric, and experiment tests
        id: native-tests
        shell: bash
        run: |
          set +e
          pytest \
            tests/test_model_hub.py \
            tests/test_pibert_pipeline.py \
            tests/test_native_suite.py \
            tests/test_the_well_provider.py \
            tests/test_scientific_hf_providers.py \
            tests/test_universal_dataset_providers.py \
            tests/test_official_upstream_sources.py \
            tests/test_metric_suites.py \
            -q --tb=short > native-suite.txt 2>&1
          status=$?
          cat native-suite.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: native-suite-diagnostics
          path: native-suite.txt
      - name: Enforce native suite result
        if: steps.native-tests.outputs.status != '0'
        run: exit 1
