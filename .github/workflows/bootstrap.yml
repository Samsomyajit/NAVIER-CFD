name: Bootstrap NAVIER-CFD repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct NAVIER-CFD platform
        shell: bash
        run: |
          cat bootstrap/part_00.txt \
              bootstrap/part_01.txt \
              bootstrap/part_02.txt \
              bootstrap/rest_a.txt \
              bootstrap/rest_b.txt > /tmp/navier-cfd.tar.gz.b64
          base64 --decode /tmp/navier-cfd.tar.gz.b64 > /tmp/navier-cfd.tar.gz
          tar --extract --gzip --file /tmp/navier-cfd.tar.gz --directory .
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Commit complete platform
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Deploy complete NAVIER-CFD platform"
            git push origin HEAD:main
          fi
