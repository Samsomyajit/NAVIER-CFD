site_name: NAVIER-CFD
site_description: Neural and Agentic Verification, Integration, Evaluation, and Recommendation for CFD
site_url: https://samsomyajit.github.io/NAVIER-CFD/docs/
repo_url: https://github.com/Samsomyajit/NAVIER-CFD
repo_name: Samsomyajit/NAVIER-CFD

theme:
  name: material
  language: en
  logo: assets/navier-cfd-icon.svg
  favicon: assets/navier-cfd-icon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang:
        - en
        - zh
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
          site_name: NAVIER-CFD 中文文档
          nav_translations:
            Home: 首页
            Experiments: 实验
            Unified Pipeline and PIBERT: 统一流程与 PIBERT
            Models: 模型
            Dataset-configured Native Suite: 数据集配置原生模型套件
            Executable Model Hub: 可执行模型中心
            Model Catalog: 模型目录
            Model Atlas: 模型图谱
            Evaluation Metrics: 评价指标
            Metrics Overview: 指标概览
            Data-oriented: 数据导向
            Physics-oriented: 物理导向
            Recommender: 推荐系统
            Overview: 概览
            Evidence Scoring: 证据评分
            Platform: 平台
            Architecture: 架构
            Dataset Catalog: 数据集目录
            Universal Dataset Providers: 通用数据集提供器
            Agentic AI: 智能体 AI
            AutoResearch: 自动研究
            AutoResearch Overview: 自动研究概览
            AutoResearch Architecture: 自动研究架构
            MCP Tools: MCP 工具
            Codex Skills: Codex 技能
            Research Contracts and Sessions: 研究契约与会话
            CFD Diagnostics: CFD 诊断
            FigureLab: 科研绘图实验室
            Release 1.1.0: 1.1.0 版本
            Roadmap: 路线图
            Dataset Cards: 数据集卡片
            Case Studies: 案例研究
            PDEBench Navier–Stokes: PDEBench Navier–Stokes
            CFDBench Cavity: CFDBench 方腔流
            CFDBench Cylinder: CFDBench 圆柱绕流
            RealPDEBench Cylinder: RealPDEBench 圆柱案例
            RealPDEBench FSI: RealPDEBench 流固耦合
            AirfRANS Geometry: AirfRANS 几何泛化
            Automotive 3D: 汽车三维空气动力学
            Hybrid Acceleration: 混合加速

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Experiments:
      - Unified Pipeline and PIBERT: UNIFIED_EXPERIMENTS.md
  - Models:
      - Dataset-configured Native Suite: NATIVE_MODEL_SUITE.md
      - Executable Model Hub: MODEL_HUB.md
      - Model Catalog: MODEL_CATALOG.md
      - Model Atlas:
          - Overview: models/README.md
          - PIBERT: models/pibert.md
          - GINO: models/gino.md
          - Transolver: models/transolver.md
          - Universal Physics Transformer: models/upt.md
          - P3D: models/p3d.md
          - AeroTransformer: models/aerotransformer.md
          - DoMINO: models/domino.md
          - FourierFlow: models/fourierflow.md
          - Indirect Neural Corrector: models/inc.md
          - PICT: models/pict.md
          - Geometry-Aware Neural Preconditioner: models/geometry_preconditioner.md
  - Evaluation Metrics:
      - Metrics Overview: METRICS.md
      - Data-oriented: METRICS_DATA.md
      - Physics-oriented: METRICS_PHYSICS.md
  - Recommender:
      - Overview: RECOMMENDER.md
      - Evidence Scoring: EVIDENCE_SCORING.md
  - Platform:
      - Architecture: ARCHITECTURE.md
      - Dataset Catalog: DATASET_CATALOG.md
      - Universal Dataset Providers: UNIVERSAL_DATASETS.md
      - Agentic AI: AGENTIC_AI.md
      - AutoResearch:
          - AutoResearch Overview: AUTORESEARCH.md
          - AutoResearch Architecture: AUTORESEARCH_ARCHITECTURE.md
          - MCP Tools: AUTORESEARCH_TOOLS.md
          - Codex Skills: CODEX_SKILLS.md
          - Research Contracts and Sessions: AUTORESEARCH_SESSIONS.md
          - CFD Diagnostics: CFD_DIAGNOSTICS.md
          - FigureLab: FIGURELAB.md
          - Release 1.1.0: RELEASE_1_1_0.md
      - Roadmap: ROADMAP.md
  - Dataset Cards:
      - CFDBench: datasets/cfdbench.md
      - RealPDEBench: datasets/realpdebench.md
      - PDEBench: datasets/pdebench.md
      - AirfRANS: datasets/airfrans.md
      - The Well: datasets/the_well.md
  - Case Studies:
      - Overview: case_studies/README.md
      - PDEBench Navier–Stokes: case_studies/pdebench_navier_stokes.md
      - CFDBench Cavity: case_studies/cfdbench_cavity.md
      - CFDBench Cylinder: case_studies/cfdbench_cylinder.md
      - RealPDEBench Cylinder: case_studies/realpdebench_cylinder.md
      - RealPDEBench FSI: case_studies/realpdebench_fsi.md
      - AirfRANS Geometry: case_studies/airfrans_geometry.md
      - Automotive 3D: case_studies/automotive_3d.md
      - Hybrid Acceleration: case_studies/hybrid_acceleration.md
